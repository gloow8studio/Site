<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hex Agency Panel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --amber: #FFB300;
      --cobalt: #1565C0;
      --cyan: #00E5FF;
      --emerald: #00C853;
      --violet: #AA00FF;
      --copper: #FF6D00;
      --red: #FF1744;
      --glow-size: 40px;
    }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: 'Orbitron', monospace;
      overflow-x: hidden;
      overflow-y: auto;
      padding-top: 120px;
      padding-bottom: 60px;
    }

    #canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .panel {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: flex-start;
      gap: 18px;
      padding: 60px 40px;
    }

    .neural-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: visible;
    }

    /* Estilos dos Cards (Simplificado) */
    .hex-card {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: floatCard 4s ease-in-out infinite;
    }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -52%) scale(1); filter: drop-shadow(0 0 8px var(--c)) drop-shadow(0 0 16px var(--c)); }
      50% { transform: translate(-50%, -52%) scale(1.06); filter: drop-shadow(0 0 14px var(--c)) drop-shadow(0 0 28px var(--c)); }
    }

    @keyframes neonPulse {
      0%, 100% { filter: drop-shadow(0 0 18px var(--c)); }
      50% { filter: drop-shadow(0 0 28px var(--c)) drop-shadow(0 0 50px var(--c)); }
    }

    .hex-wrap {
      position: relative;
      width: 140px;
      height: 161px;
      filter: drop-shadow(0 0 18px var(--c));
      transition: filter .4s ease;
      animation: neonPulse 3s ease-in-out infinite;
    }

    .hex-wrap:hover {
      filter: drop-shadow(0 0 40px var(--c)) drop-shadow(0 0 90px var(--c)) drop-shadow(0 0 140px var(--c));
      animation: none;
    }

    /* HUD frame SVG – fica sobre a imagem */
    .hex-wrap > svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    /* hex-bg transparente para revelar o WebP */
    .hex-bg {
      fill: transparent;
    }

    /* Sem preenchimento nos polígonos HUD – só as bordas são visíveis */
    .hex-glow {
      fill: none;
    }

    .hex-rim2 {
      fill: none;
    }

    .hex-rim {
      fill: none;
      stroke-width: 2.5;
      stroke: var(--c);
      opacity: .9;
    }

    /* Imagem WebP como camada de fundo do hexágono */
    .hex-icon {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      clip-path: polygon(50% 2.5%, 97.1% 24.2%, 97.1% 75.8%, 50% 97.5%, 2.9% 75.8%, 2.9% 24.2%);
      transition: filter 0.4s ease, transform 0.4s ease;
      filter: brightness(0.9) saturate(1.1);
    }

    .hex-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hex-wrap:hover .hex-icon {
      filter: brightness(1.15) saturate(1.3) drop-shadow(0 0 12px var(--c));
      transform: scale(1.04);
    }

    .hex-card {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: floatCard 4s ease-in-out infinite;
      cursor: pointer;
    }

    .hex-card:hover .label-name {
      text-shadow: 0 0 18px var(--c), 0 0 40px var(--c);
    }

    .label-name {
      display: block;
      font-weight: 900;
      font-size: 15px;
      letter-spacing: .22em;
      color: var(--c);
      text-shadow: 0 0 10px var(--c);
      transition: text-shadow 0.4s ease;
    }

    .label-sub {
      display: block;
      font-family: 'Rajdhani', sans-serif;
      font-size: 9.5px;
      color: rgba(255, 255, 255, .55);
      text-transform: uppercase;
    }

    /* Cores dos Cards */
    .card-1 { --c: var(--amber); }
    .card-2 { --c: var(--cobalt); }
    .card-3 { --c: var(--cyan); }
    .card-4 { --c: var(--emerald); }
    .card-5 { --c: var(--violet); }
    .card-6 { --c: var(--copper); }
    .card-7 { --c: var(--red); }

    .title-bar {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      width: 100%;
    }

    /* Botão Ecossistema */
    .btn-ecosystem {
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 40px;
      margin: 60px auto 0;
      border: 1px solid #00E5FF;
      background: rgba(0,229,255,.07);
      color: #00E5FF;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      letter-spacing: .28em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      clip-path: polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px));
      transition: background .3s, box-shadow .3s;
      animation: btnPulse 3s ease-in-out infinite;
    }
    .btn-ecosystem:hover {
      background: rgba(0,229,255,.18);
      box-shadow: 0 0 40px rgba(0,229,255,.4), 0 0 80px rgba(0,229,255,.15);
      animation: none;
    }
    @keyframes btnPulse {
      0%,100% { box-shadow: 0 0 10px rgba(0,229,255,.2); }
      50%      { box-shadow: 0 0 30px rgba(0,229,255,.5), 0 0 60px rgba(0,229,255,.2); }
    }
    .btn-ecosystem .arrow { font-size: 20px; transition: transform .3s; }
    .btn-ecosystem:hover .arrow { transform: translateX(5px); }

    .title-bar span {
      font-size: 11px;
      letter-spacing: .6em;
      color: rgba(255, 255, 255, .25);
      text-transform: uppercase;
    }

    /* AJUSTE MOBILE CORRIGIDO */
    @media (max-width: 768px) {
      body {
        padding-top: 100px;
      }

      .panel {
        flex-direction: column;
        align-items: center;
        gap: 50px;
        padding: 0;
        margin-top: 80px;
      }

      /* MARGEM AQUI EVITA SOBREPOSIÇÃO */
      .title-bar {
        position: absolute;
        top: 30px;
      }

      .hex-card {
        animation: none;
      }
    }
  </style>

    /* ── NEURAL NETWORK connectors ── */
    (function () {
      const cards = document.querySelectorAll('.hex-card');
      const svg = document.getElementById('neural');
      const panel = document.getElementById('panel');
      const colors = ['#FFB300', '#1E88E5', '#00E5FF', '#00C853', '#AA00FF', '#FF6D00', '#FF1744'];

      function buildNeural() {
        svg.innerHTML = '';
        const pr = panel.getBoundingClientRect();
        const centers = Array.from(cards).map(c => {
          const r = c.getBoundingClientRect();
          return { x: r.left - pr.left + r.width / 2, y: r.top - pr.top + 80 };
        });

        const isMobile = window.innerWidth <= 768;

        if (isMobile) {
          // vertical spine down the center
          const spineX = centers[0].x;
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', spineX); line.setAttribute('y1', centers[0].y);
          line.setAttribute('x2', spineX); line.setAttribute('y2', centers[centers.length - 1].y);
          line.setAttribute('stroke', 'rgba(255,255,255,.06)');
          line.setAttribute('stroke-width', '1');
          line.setAttribute('stroke-dasharray', '6 8');
          svg.appendChild(line);

          centers.forEach((c, i) => {
            // diagonal to neighbours
            if (i < 6) {
              const next = centers[i + 1];
              const d = document.createElementNS('http://www.w3.org/2000/svg', 'line');
              d.setAttribute('x1', c.x); d.setAttribute('y1', c.y);
              d.setAttribute('x2', next.x); d.setAttribute('y2', next.y);
              d.setAttribute('stroke', `url(#lg${i})`);
              d.setAttribute('stroke-width', '1.5');
              d.setAttribute('stroke-dasharray', '3 5');
              d.setAttribute('opacity', '.3');
              // gradient def
              const defs = svg.querySelector('defs') || svg.insertBefore(document.createElementNS('http://www.w3.org/2000/svg', 'defs'), svg.firstChild);
              const lg = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
              lg.setAttribute('id', `lg${i}`);
              lg.setAttribute('gradientUnits', 'userSpaceOnUse');
              lg.setAttribute('x1', c.x); lg.setAttribute('y1', c.y);
              lg.setAttribute('x2', next.x); lg.setAttribute('y2', next.y);
              const s1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
              s1.setAttribute('offset', '0%'); s1.setAttribute('stop-color', colors[i]);
              const s2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
              s2.setAttribute('offset', '100%'); s2.setAttribute('stop-color', colors[i + 1]);
              lg.appendChild(s1); lg.appendChild(s2); defs.appendChild(lg);
              svg.appendChild(d);
            }
          });
        } else {
          // horizontal spine
          const spineY = centers[0].y + 30;
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', centers[0].x); line.setAttribute('y1', spineY);
          line.setAttribute('x2', centers[6].x); line.setAttribute('y2', spineY);
          line.setAttribute('stroke', 'rgba(255,255,255,.06)');
          line.setAttribute('stroke-width', '1');
          line.setAttribute('stroke-dasharray', '6 8');
          svg.appendChild(line);

          centers.forEach((c, i) => {
            // vertical drop to spine
            const v = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            v.setAttribute('x1', c.x); v.setAttribute('y1', c.y + 2);
            v.setAttribute('x2', c.x); v.setAttribute('y2', spineY);
            v.setAttribute('stroke', colors[i]);
            v.setAttribute('stroke-width', '1');
            v.setAttribute('opacity', '.18');
            svg.appendChild(v);

            // diagonal to neighbours
            if (i < 6) {
              const next = centers[i + 1];
              const d = document.createElementNS('http://www.w3.org/2000/svg', 'line');
              d.setAttribute('x1', c.x); d.setAttribute('y1', c.y);
              d.setAttribute('x2', next.x); d.setAttribute('y2', next.y);
              d.setAttribute('stroke', `url(#lg${i})`);
              d.setAttribute('stroke-width', '1');
              d.setAttribute('stroke-dasharray', '3 5');
              d.setAttribute('opacity', '.22');
              // gradient def
              const defs = svg.querySelector('defs') || svg.insertBefore(document.createElementNS('http://www.w3.org/2000/svg', 'defs'), svg.firstChild);
              const lg = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
              lg.setAttribute('id', `lg${i}`);
              lg.setAttribute('gradientUnits', 'userSpaceOnUse');
              lg.setAttribute('x1', c.x); lg.setAttribute('y1', c.y);
              lg.setAttribute('x2', next.x); lg.setAttribute('y2', next.y);
              const s1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
              s1.setAttribute('offset', '0%'); s1.setAttribute('stop-color', colors[i]);
              const s2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
              s2.setAttribute('offset', '100%'); s2.setAttribute('stop-color', colors[i + 1]);
              lg.appendChild(s1); lg.appendChild(s2); defs.appendChild(lg);
              svg.appendChild(d);
            }

            // node dot on spine
            const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            dot.setAttribute('cx', c.x); dot.setAttribute('cy', spineY);
            dot.setAttribute('r', '2.5');
            dot.setAttribute('fill', colors[i]);
            dot.setAttribute('opacity', '.5');
            svg.appendChild(dot);
          });
        }
      }

      setTimeout(buildNeural, 100);
      window.addEventListener('resize', () => setTimeout(buildNeural, 100));
    })();
  </script>
</body>

</html>
