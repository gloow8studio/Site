<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow8 | Ecossistema de Marcas que Vão Além</title>
<meta name="description" content="Glow8 Studio – Ecossistema vivo de criatividade, tecnologia e resultados.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --amber:#FFB300;--cobalt:#1E88E5;--cyan:#00E5FF;
  --emerald:#00C853;--violet:#AA00FF;--copper:#FF6D00;
  --red:#FF1744;
}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:#000;
  font-family:'Orbitron',monospace;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
/* ── PARALLAX BG ── */
#bg{
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 60% 40%,#0a0020 0%,#000005 40%,#000 100%);
  will-change:transform;
}
#bg::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 20% 80%,rgba(0,229,255,.08) 0%,transparent 50%),
    radial-gradient(circle at 80% 20%,rgba(170,0,255,.1) 0%,transparent 50%),
    radial-gradient(circle at 50% 50%,rgba(255,179,0,.05) 0%,transparent 60%);
}
/* Stars */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── LEFT PANEL ── */
#left-panel{
  position:fixed;left:5vw;top:50%;transform:translateY(-50%);
  z-index:10;max-width:340px;
}
.eco-tag{
  font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:.5em;
  color:rgba(0,229,255,.6);text-transform:uppercase;margin-bottom:18px;
  display:flex;align-items:center;gap:8px;
}
.eco-tag::before{content:'';display:inline-block;width:32px;height:1px;background:var(--cyan);}
.hero-title{
  font-size:clamp(28px,3.5vw,52px);font-weight:900;line-height:1.1;
  color:#fff;text-transform:uppercase;margin-bottom:14px;
}
.hero-title .accent{color:var(--cyan);text-shadow:0 0 20px var(--cyan),0 0 60px rgba(0,229,255,.4);}
.hero-sub{
  font-family:'Rajdhani',sans-serif;font-size:15px;line-height:1.7;
  color:rgba(255,255,255,.5);margin-bottom:36px;max-width:300px;
}
#btn-explore{
  display:inline-flex;align-items:center;gap:12px;
  padding:14px 32px;border:1px solid var(--cyan);
  background:rgba(0,229,255,.07);color:var(--cyan);
  font-family:'Orbitron',monospace;font-size:11px;letter-spacing:.25em;
  text-transform:uppercase;cursor:pointer;
  transition:all .3s ease;position:relative;overflow:hidden;
  clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));
}
#btn-explore:hover{background:rgba(0,229,255,.18);box-shadow:0 0 30px rgba(0,229,255,.35);}
#btn-explore .arrow{font-size:18px;transition:transform .3s;}
#btn-explore:hover .arrow{transform:translateX(4px);}

/* ── ORBITAL STAGE ── */
#stage{
  position:relative;z-index:5;
  width:min(700px,90vw);height:min(700px,90vw);
  margin-left:auto;margin-right:5vw;
  flex-shrink:0;
}
#orbit-canvas{position:absolute;inset:0;pointer-events:none;}

/* ── NUCLEUS ── */
#nucleus{
  position:absolute;
  left:50%;top:50%;transform:translate(-50%,-50%);
  width:160px;height:160px;
  display:flex;align-items:center;justify-content:center;
  z-index:20;cursor:default;
}
.nucleus-ring{
  position:absolute;inset:0;border-radius:50%;
  border:2px solid rgba(0,229,255,.3);
  animation:ringPulse 2s ease-in-out infinite;
}
.nucleus-ring:nth-child(2){inset:-12px;border-color:rgba(170,0,255,.2);animation-delay:.6s;}
.nucleus-ring:nth-child(3){inset:-26px;border-color:rgba(255,179,0,.15);animation-delay:1.2s;}
@keyframes ringPulse{0%,100%{opacity:.6;transform:scale(1);}50%{opacity:1;transform:scale(1.04);}}
.nucleus-core{
  position:relative;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,229,255,.25) 0%,rgba(170,0,255,.15) 50%,transparent 100%);
  border:1.5px solid rgba(0,229,255,.6);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px rgba(0,229,255,.3),0 0 80px rgba(170,0,255,.15),inset 0 0 40px rgba(0,229,255,.1);
  animation:coreGlow 3s ease-in-out infinite;
}
@keyframes coreGlow{
  0%,100%{box-shadow:0 0 40px rgba(0,229,255,.3),0 0 80px rgba(170,0,255,.15),inset 0 0 40px rgba(0,229,255,.1);}
  50%{box-shadow:0 0 60px rgba(0,229,255,.5),0 0 120px rgba(170,0,255,.3),inset 0 0 60px rgba(0,229,255,.2);}
}
.nucleus-text{
  text-align:center;font-size:7px;letter-spacing:.15em;
  color:rgba(0,229,255,.9);text-transform:uppercase;line-height:1.5;
  text-shadow:0 0 10px var(--cyan);
  padding:8px;
}

/* ── LIGHTNING CANVAS ── */
#lightning-canvas{position:absolute;inset:-100px;z-index:6;pointer-events:none;width:calc(100% + 200px);height:calc(100% + 200px);}

/* ── HEX NODES ── */
.hex-node{
  position:absolute;width:110px;height:127px;
  transform:translate(-50%,-50%);
  cursor:pointer;z-index:15;
  transition:filter .3s;
  filter:drop-shadow(0 0 12px var(--nc));
}
.hex-node:hover{
  filter:drop-shadow(0 0 28px var(--nc)) drop-shadow(0 0 60px var(--nc));
}
.hex-node svg{position:absolute;inset:0;width:100%;height:100%;}
.hex-node .hex-img{
  position:absolute;inset:0;
  clip-path:polygon(50% 2.5%,97.1% 24.2%,97.1% 75.8%,50% 97.5%,2.9% 75.8%,2.9% 24.2%);
  overflow:hidden;
}
.hex-node .hex-img img{width:100%;height:100%;object-fit:cover;display:block;}
.hex-node .hex-label{
  position:absolute;bottom:-38px;left:50%;transform:translateX(-50%);
  text-align:center;white-space:nowrap;
}
.hex-node .hex-label .nm{
  display:block;font-size:11px;font-weight:900;letter-spacing:.2em;
  color:var(--nc);text-shadow:0 0 8px var(--nc);
}
.hex-node .hex-label .sb{
  display:block;font-family:'Rajdhani',sans-serif;font-size:8.5px;
  color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.1em;
}

/* ── VFX OVERLAY ── */
#vfx-layer{position:fixed;inset:0;z-index:50;pointer-events:none;}
.vfx-particle{position:absolute;border-radius:50%;pointer-events:none;}

/* ── TRANSITION OVERLAY ── */
#transition-overlay{
  position:fixed;inset:0;z-index:100;
  background:radial-gradient(circle,rgba(0,229,255,.2) 0%,rgba(0,0,0,0) 70%);
  opacity:0;pointer-events:none;
  transition:opacity .5s ease;
}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  #left-panel{position:fixed;left:50%;top:auto;bottom:24px;
    transform:translateX(-50%);text-align:center;max-width:90vw;}
  .eco-tag{justify-content:center;}
  .hero-title{font-size:22px;}
  .hero-sub{display:none;}
  #stage{margin:0 auto;width:min(480px,95vw);height:min(480px,95vw);}
  #nucleus{width:100px;height:100px;}
  .nucleus-core{width:76px;height:76px;}
  .nucleus-text{font-size:5.5px;}
  .hex-node{width:72px;height:83px;}
  .hex-node .hex-label .nm{font-size:8px;}
}

/* ── BACK BUTTON ── */
#btn-back{
  position:fixed;
  top:22px;
  left:24px;
  z-index:200;
  display:inline-flex;
  align-items:center;
  gap:9px;
  padding:11px 22px;
  border:1px solid rgba(0,229,255,.5);
  background:rgba(0,0,0,.55);
  color:rgba(0,229,255,.85);
  font-family:'Orbitron',monospace;
  font-size:9px;
  letter-spacing:.22em;
  text-transform:uppercase;
  text-decoration:none;
  cursor:pointer;
  backdrop-filter:blur(10px);
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  transition:background .3s, box-shadow .3s, color .3s;
}
#btn-back:hover{
  background:rgba(0,229,255,.14);
  color:#00E5FF;
  box-shadow:0 0 20px rgba(0,229,255,.35);
}
#btn-back .bk-arrow{ font-size:15px; transition:transform .3s; }
#btn-back:hover .bk-arrow{ transform:translateX(-4px); }
</style>
</head>
<body>
<a id="btn-back" href="index.html">
  <span class="bk-arrow">←</span> &nbsp; VOLTAR
</a>
<div id="bg"></div>
<canvas id="stars"></canvas>
<canvas id="lightning-canvas"></canvas>
<div id="vfx-layer"></div>
<div id="transition-overlay"></div>

<div id="left-panel">
  <div class="eco-tag">Ecossistema de Marcas</div>
  <h1 class="hero-title">GLOW8<br><span class="accent">STUDIO</span></h1>
  <p class="hero-sub">Marcas que vão além — criatividade, tecnologia e resultados em um ecossistema vivo.</p>
  <button id="btn-explore" onclick="document.getElementById('stage').scrollIntoView({behavior:'smooth'})">
    EXPLORAR SOLUÇÕES <span class="arrow">→</span>
  </button>
</div>

<div id="stage">
  <canvas id="orbit-canvas"></canvas>
  <div id="nucleus">
    <div class="nucleus-ring"></div>
    <div class="nucleus-ring"></div>
    <div class="nucleus-ring"></div>
    <div class="nucleus-core">
      <div class="nucleus-text">CRIATIVIDADE<br>TECNOLOGIA<br>RESULTADOS</div>
    </div>
  </div>
</div>

<audio id="snd-base" loop preload="none"></audio>

<script>
// ── STARS ──
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  const stars=Array.from({length:220},()=>({
    x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    r:Math.random()*1.4+.2,a:Math.random(),d:Math.random()*.003+.001
  }));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a+=s.d;if(s.a>1||s.a<0)s.d*=-1;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.a*.7})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── PARALLAX BG ──
window.addEventListener('mousemove',e=>{
  const x=(e.clientX/innerWidth-.5)*18;
  const y=(e.clientY/innerHeight-.5)*18;
  document.getElementById('bg').style.transform=`translate(${x}px,${y}px) scale(1.04)`;
});

// ── HEX DATA ──
const HEXES=[
  {id:'vyra', name:'VYRA', sub:'Design Gráfico', img:'vyra.webp', color:'#FFB300', url:'amarelo.html'},
  {id:'elon', name:'ELON', sub:'Web Design',     img:'elon.webp',  color:'#1E88E5', url:'azul.html'},
  {id:'kryon',name:'KRYON',sub:'A.I. Design',    img:'kryon.webp', color:'#00E5FF', url:'ciano.html'},
  {id:'sylar',name:'SYLAR',sub:'Analytics',      img:'sylar.webp', color:'#00C853', url:'verde.html'},
  {id:'zynth',name:'ZYNTH',sub:'Motion / VFX',   img:'zynth.webp', color:'#AA00FF', url:'roxo.html'},
  {id:'auron',name:'AURON',sub:'Archviz 3D',     img:'auron.webp', color:'#FF6D00', url:'laranja.html'},
  {id:'nexar',name:'NEXAR',sub:'Animação/Games', img:'nexar.webp', color:'#FF1744', url:'vermelho.html'}
];

// ── ORBIT SYSTEM ──
const stage=document.getElementById('stage');
let orbitPaused=false,orbitAngle=0,orbitSpeed=.008;
const ORBIT_R=()=>stage.offsetWidth*.38;

// Build hex nodes
const nodes=HEXES.map((h,i)=>{
  const el=document.createElement('div');
  el.className='hex-node';
  el.id='node-'+h.id;
  el.style.setProperty('--nc',h.color);
  el.innerHTML=`
    <svg viewBox="0 0 110 127" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="gn${i}"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <radialGradient id="rn${i}" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="${h.color}" stop-opacity=".22"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <polygon style="fill:url(#rn${i})" points="55,3 107,30 107,97 55,124 3,97 3,30"/>
      <polygon fill="none" stroke="${h.color}" stroke-width="1.5" opacity=".9" points="55,3 107,30 107,97 55,124 3,97 3,30"/>
      <polygon fill="none" stroke="${h.color}" stroke-width=".8" opacity=".5" points="55,7 103,32 103,95 55,120 7,95 7,32"/>
      ${[3,30,107,30,107,97,55,124,3,97,55,3].map((v,j,a)=>j%2===0?`<circle cx="${v}" cy="${a[j+1]}" r="2" fill="${h.color}" opacity=".8"/>`:'')}
    </svg>
    <div class="hex-img"><img src="${h.img}" alt="${h.name}" loading="lazy"></div>
    <div class="hex-label"><span class="nm">${h.name}</span><span class="sb">${h.sub}</span></div>
  `;

  el.addEventListener('mouseenter',()=>{ orbitPaused=true; triggerHoverVFX(h,el); });
  el.addEventListener('mouseleave',()=>{ orbitPaused=false; });
  el.addEventListener('click',()=>enterHex(h,el));
  stage.appendChild(el);
  return {el,h,offset:i*(Math.PI*2/7)};
});

// Position loop
function updateOrbit(){
  const R=ORBIT_R();
  const cx=stage.offsetWidth/2, cy=stage.offsetHeight/2;
  if(!orbitPaused) orbitAngle+=orbitSpeed;
  nodes.forEach(n=>{
    const a=orbitAngle+n.offset;
    const x=cx+Math.cos(a)*R;
    const y=cy+Math.sin(a)*R*.55; // ellipse
    n.el.style.left=x+'px';
    n.el.style.top=y+'px';
    // depth scale
    const depth=.8+.25*((Math.sin(a)+1)/2);
    n.el.style.transform=`translate(-50%,-50%) scale(${depth})`;
    n.el.style.zIndex=Math.round(10+depth*10);
  });
  requestAnimationFrame(updateOrbit);
}
updateOrbit();

// ── LIGHTNING ──
const LC=document.getElementById('lightning-canvas');
const lctx=LC.getContext('2d');
function resizeLC(){
  LC.width=stage.offsetWidth+200;LC.height=stage.offsetHeight+200;
  LC.style.left=(-100+(stage.getBoundingClientRect().left))+'px';
  LC.style.top=(-100+(stage.getBoundingClientRect().top))+'px';
}
resizeLC();window.addEventListener('resize',resizeLC);

function lightning(x1,y1,x2,y2,rough,col,alpha){
  if(Math.hypot(x2-x1,y2-y1)<4){
    lctx.beginPath();lctx.moveTo(x1,y1);lctx.lineTo(x2,y2);
    lctx.strokeStyle=col.replace(')',`,${alpha})`).replace('rgb','rgba');
    lctx.lineWidth=1.2;lctx.stroke();return;
  }
  const mx=(x1+x2)/2+(Math.random()-.5)*rough;
  const my=(y1+y2)/2+(Math.random()-.5)*rough;
  lightning(x1,y1,mx,my,rough*.55,col,alpha);
  lightning(mx,my,x2,y2,rough*.55,col,alpha);
}

let ltFrame=0;
function drawLightning(){
  lctx.clearRect(0,0,LC.width,LC.height);
  ltFrame++;
  const ox=LC.width/2, oy=LC.height/2;
  const count=3+Math.floor(Math.random()*3);
  for(let i=0;i<count;i++){
    if(Math.random()>.35) continue;
    const a=Math.random()*Math.PI*2;
    const len=60+Math.random()*120;
    const ex=ox+Math.cos(a)*len, ey=oy+Math.sin(a)*len;
    const cols=['rgb(0,229,255)','rgb(170,0,255)','rgb(255,255,255)'];
    const col=cols[Math.floor(Math.random()*cols.length)];
    lightning(ox,oy,ex,ey,30+Math.random()*40,col,.6+Math.random()*.4);
  }
  requestAnimationFrame(drawLightning);
}
drawLightning();

// ── NUCLEUS MOUSE PROXIMITY SOUND ──
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null,staticNode=null,gainNode=null,filterNode=null;
function initAudio(){
  if(actx) return;
  actx=new AudioCtx();
  gainNode=actx.createGain();gainNode.gain.value=0;
  filterNode=actx.createBiquadFilter();filterNode.type='bandpass';filterNode.frequency.value=200;filterNode.Q.value=0.5;
  const buf=actx.createBuffer(1,actx.sampleRate*2,actx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*.8;
  staticNode=actx.createBufferSource();staticNode.buffer=buf;staticNode.loop=true;
  staticNode.connect(filterNode);filterNode.connect(gainNode);gainNode.connect(actx.destination);
  staticNode.start();
}
document.getElementById('nucleus').addEventListener('mouseenter',()=>{
  initAudio();if(gainNode) gainNode.gain.linearRampToValueAtTime(.18,actx.currentTime+.4);
});
document.getElementById('nucleus').addEventListener('mouseleave',()=>{
  if(gainNode) gainNode.gain.linearRampToValueAtTime(0,actx.currentTime+.5);
});

// ── VFX SYSTEM ──
const vfxLayer=document.getElementById('vfx-layer');
function spawnParticle(x,y,color,size,life,vx,vy){
  const p=document.createElement('div');
  p.className='vfx-particle';
  p.style.cssText=`left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${color};
    box-shadow:0 0 ${size*2}px ${color};position:fixed;border-radius:50%;pointer-events:none;`;
  vfxLayer.appendChild(p);
  let t=0;
  const step=()=>{
    t+=16;const prog=t/life;
    if(prog>=1){p.remove();return;}
    p.style.left=(x+vx*t*.05)+'px';
    p.style.top=(y+vy*t*.05)+'px';
    p.style.opacity=1-prog;
    p.style.transform=`scale(${1-prog*.5})`;
    requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

function getCenter(el){
  const r=el.getBoundingClientRect();
  return{x:r.left+r.width/2,y:r.top+r.height/2};
}

function triggerHoverVFX(h,el){
  const {x,y}=getCenter(el);
  const count=18;
  switch(h.id){
    case 'vyra':
      // golden wireframe bloom
      for(let i=0;i<count;i++){
        const a=Math.random()*Math.PI*2,sp=2+Math.random()*4;
        spawnParticle(x,y,'#FFB300',3+Math.random()*4,800,Math.cos(a)*sp,Math.sin(a)*sp);
      }
      playTone(1200,.08,'square',.3);
      break;
    case 'elon':
      // binary data cascade
      for(let i=0;i<count;i++){
        const a=-Math.PI/2+( Math.random()-.5)*.8,sp=3+Math.random()*5;
        spawnParticle(x,y,'#1E88E5',2+Math.random()*3,700,Math.cos(a)*sp,Math.sin(a)*sp);
      }
      playTone(880,.06,'sawtooth',.25);
      break;
    case 'kryon':
      // neural ripple cyan
      for(let i=0;i<count;i++){
        const a=(i/count)*Math.PI*2,sp=2+Math.random()*3;
        spawnParticle(x,y,'#00E5FF',2+Math.random()*3,900,Math.cos(a)*sp,Math.sin(a)*sp);
      }
      playTone(2000,.05,'sine',.35);
      break;
    case 'sylar':
      // green data bars
      for(let i=0;i<count;i++){
        const a=Math.random()*Math.PI*2,sp=1+Math.random()*5;
        spawnParticle(x,y,'#00C853',2+Math.random()*5,600,Math.cos(a)*sp,Math.sin(a)*sp);
      }
      playTone(440,.07,'square',.2);
      break;
    case 'zynth':
      // purple swoosh trails
      for(let i=0;i<count;i++){
        const a=Math.random()*Math.PI*2,sp=4+Math.random()*6;
        spawnParticle(x,y,'#AA00FF',3+Math.random()*4,1000,Math.cos(a)*sp,Math.sin(a)*sp);
      }
      playTone(660,.09,'sawtooth',.4);
      break;
    case 'auron':
      // 3D grid expansion orange
      for(let i=0;i<count;i++){
        const a=Math.random()*Math.PI*2,sp=2+Math.random()*4;
        spawnParticle(x,y,'#FF6D00',3+Math.random()*5,800,Math.cos(a)*sp,Math.sin(a)*sp);
      }
      playTone(330,.1,'square',.3);
      break;
    case 'nexar':
      // glitch red particles
      for(let i=0;i<count*1.5;i++){
        const a=Math.random()*Math.PI*2,sp=3+Math.random()*7;
        spawnParticle(x,y,'#FF1744',2+Math.random()*4,600,Math.cos(a)*sp,Math.sin(a)*sp);
      }
      playTone(220,.12,'sawtooth',.5);
      break;
  }
}

function playTone(freq,vol,type,dur){
  try{
    initAudio();
    const osc=actx.createOscillator(),g=actx.createGain();
    osc.type=type;osc.frequency.value=freq;
    g.gain.setValueAtTime(vol,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
    osc.connect(g);g.connect(actx.destination);
    osc.start();osc.stop(actx.currentTime+dur);
  }catch(e){}
}

// ── ENTER HEX TRANSITION ──
function enterHex(h,el){
  initAudio();
  // burst VFX
  const {x,y}=getCenter(el);
  for(let i=0;i<40;i++){
    const a=Math.random()*Math.PI*2,sp=4+Math.random()*10;
    spawnParticle(x,y,h.color,3+Math.random()*5,1200,Math.cos(a)*sp,Math.sin(a)*sp);
  }
  // overlay flash
  const ov=document.getElementById('transition-overlay');
  ov.style.background=`radial-gradient(circle at ${x}px ${y}px, ${h.color}44 0%, rgba(0,0,0,.8) 70%)`;
  ov.style.opacity='1';ov.style.pointerEvents='all';
  // orbital scale-up
  stage.style.transition='transform 1s ease, opacity 1s ease';
  stage.style.transform='scale(2.5)';stage.style.opacity='0';
  playTone(h.id==='nexar'?150:h.id==='zynth'?500:440,.15,'sine',.5);
  setTimeout(()=>{ window.location.href=h.url; },900);
}
